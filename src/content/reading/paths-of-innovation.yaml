title: "Paths of Innovation: Technological Change in 20th-Century America"
author: "David C. Mowery & Nathan Rosenberg"
year: 1998
category: "institutional"
why: "Mowery and Rosenberg's argument that 20th-century American technological change was driven by the simultaneous rise of engineering and applied-science disciplines inside universities alongside corporate R&D labs and federal research investment — the institutional layer arriving as a system, not as a sequence of standalone breakthroughs. Reads as a long-form antecedent to the 2026 WEF essay I wrote on the institutional layer between state and market. Rosenberg taught at Stanford for decades; his economic history of technology is part of the institutional DNA of how we think about innovation here."
order: 16
