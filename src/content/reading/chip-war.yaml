title: "Chip War: The Fight for the World's Most Critical Technology"
author: "Chris Miller"
year: 2022
category: "institutional"
why: "Miller's narrative history of how the semiconductor industry got concentrated in a few firms and a few fabs, and what that concentration now means as export controls and industrial policy are used to reshape it. Essential background for the export-controls and global-reallocation-of-venture-capital strand of my own research."
order: 8
