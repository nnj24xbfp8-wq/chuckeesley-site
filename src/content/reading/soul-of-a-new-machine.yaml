title: "The Soul of a New Machine"
author: "Tracy Kidder"
year: 1981
category: "return-to"
why: "Kidder's Pulitzer-winning account of the Data General team building the Eclipse MV/8000 minicomputer. The closest thing to canon for what engineering team formation actually feels like at high stakes, the schedules, the moral economies of 'signing up,' the way a project recruits its own particular kind of person. I assign chapters when teaching team formation."
order: 7
