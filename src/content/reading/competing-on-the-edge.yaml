title: "Competing on the Edge: Strategy as Structured Chaos"
author: "Shona L. Brown & Kathleen M. Eisenhardt"
year: 1998
category: "foundational"
why: "Brown and Eisenhardt's classic on how firms navigate the edge between rigid structure and unbounded improvisation in fast-moving markets, the foundational text for what later became the dynamic-capabilities research program. Kathy is my MS&E colleague and co-author on our 2017 SMJ paper on institutional intermediaries in emerging economies. Pairs naturally with Simple Rules above as the deeper-research version of the same set of ideas; the two books together cover most of what a founder needs to know about strategy when the ground keeps shifting underneath."
order: 16
