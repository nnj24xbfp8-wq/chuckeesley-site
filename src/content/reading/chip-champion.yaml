title: "Chip Champion: The Triumph of TSMC and Taiwan"
author: "Owen Hung-Wen Lin"
year: 2024
category: "institutional"
why: "Lin's account of how TSMC and Taiwan's broader semiconductor ecosystem actually got built, written from inside the ecosystem rather than from a Western policy vantage. The natural complement to Chris Miller's Chip War: where Miller frames the geopolitics, Lin gives you the firm-level and institutional choices. Reads especially well alongside my ongoing work on Taiwan's deep-tech ventures through the ITRI–Stanford program."
order: 13
