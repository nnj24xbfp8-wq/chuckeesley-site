title: "The Shenzhen Experiment: The Story of China's Instant City"
author: "Juan Du"
year: 2020
category: "classroom"
why: "The text I'm teaching from in the Stanford BOSP Shenzhen Global Seminar this summer. Juan Du, an architect and urban historian who lived and worked in Shenzhen for years, complicates the standard 'fishing village to megacity in 40 years' narrative — Shenzhen's pre-1980 villages, networks, and informal-economy infrastructure shaped what the Special Economic Zone could become. The single best book for understanding the institutional and physical layers that made Shenzhen's innovation ecosystem possible, beyond the policy-only story most observers tell."
order: 5
