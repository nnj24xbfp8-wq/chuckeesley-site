title: "The Founder's Dilemmas: Anticipating and Avoiding the Pitfalls That Can Sink a Startup"
author: "Noam Wasserman"
year: 2012
category: "foundational"
why: "Wasserman's empirical synthesis of the choices founders make about co-founders, equity, control, and timing, and which ones predictably blow up the company. Built on a survey methodology that's a close cousin of the alumni studies I've run at MIT and Stanford, and the cleanest single text I recommend to students wrestling with the practical decisions of team formation before they've made them irreversible."
order: 10
