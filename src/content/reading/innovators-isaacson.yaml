title: "The Innovators: How a Group of Hackers, Geniuses, and Geeks Created the Digital Revolution"
author: "Walter Isaacson"
year: 2014
category: "foundational"
why: "Isaacson's popular history of the computing pioneers — Babbage, Lovelace, Turing, the Bell Labs transistor group, the early personal-computer hobbyists, the web. Broad-stroke and readable; the right book to hand someone who wants the engineering-history arc in one volume. The implicit argument that innovation is always team-based and institutional, not solitary, dovetails with how I teach venture formation."
order: 12
