title: "The Cathedral and the Bazaar"
author: "Eric S. Raymond"
year: 1999
category: "return-to"
why: "Raymond's essays on open-source as an organizational form — written in the late 1990s but still the clearest account of why decentralized, peer-to-peer production beats top-down planning in certain information environments. I keep returning to it when thinking about platform-mediated entrepreneurship and how distributed networks of founders can outperform more tightly coordinated firms."
order: 5
