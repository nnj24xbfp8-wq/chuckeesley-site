title: "Bill & Dave: How Hewlett and Packard Built the World's Greatest Company"
author: "Michael S. Malone"
year: 2007
category: "institutional"
why: "Malone's history of Bill Hewlett and Dave Packard — not the company, the relationship and the management philosophy that produced the company. The closest thing to a long-form case study on how a founding partnership and a durable institutional culture actually compound. Pairs with The Silicon Valley Edge as the operator's view of the same Stanford / Silicon Valley story."
order: 14
