title: "Mission Economy: A Moonshot Guide to Changing Capitalism"
author: "Mariana Mazzucato"
year: 2021
category: "institutional"
why: "Mazzucato's sequel to The Entrepreneurial State, moving from 'public funding underwrites private innovation' to a concrete case for mission-oriented industrial policy. Reads best paired with Lerner's Boulevard of Broken Dreams as the opposite pole of the same conversation, what kind of state ambition actually produces innovation, and what kind just produces failed programs."
order: 9
