title: "Inside the Black Box: Technology and Economics"
author: "Nathan Rosenberg"
year: 1982
category: "institutional"
why: "Nathan Rosenberg's foundational essays on what economists had previously ignored about technology, that technical change is endogenous, cumulative, and shaped by institutional arrangements rather than falling from the sky as exogenous shocks. The single most influential book in the economics of technology. Rosenberg taught at Stanford for decades; his work is part of the institutional DNA of how we think about innovation here, and pairs with Paths of Innovation above as the historical-economics companion to that book's empirical sweep across 20th-century American industries."
order: 19
