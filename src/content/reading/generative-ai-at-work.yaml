title: "Generative AI at Work"
author: "Erik Brynjolfsson, Danielle Li & Lindsey R. Raymond"
year: 2023
category: "recent"
why: "The most carefully executed early study of generative AI's effect on real workers — a field experiment showing 14% average productivity gains, with the largest effects on the least experienced workers. Brynjolfsson is my co-author on the Nature paper, and this is the work I now point to when founders ask me what the evidence actually says about AI in their teams."
link: "https://www.nber.org/papers/w31161"
order: 1
