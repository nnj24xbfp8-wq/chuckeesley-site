title: "Skunk Works: A Personal Memoir of My Years at Lockheed"
author: "Ben R. Rich & Leo Janos"
year: 1994
category: "institutional"
why: "Ben Rich's memoir of running Lockheed Skunk Works after Kelly Johnson. Engineering-institution design at the limit, what it takes to maintain rapid prototyping inside a giant defense prime. Useful counterpoint to the long-horizon Bell Labs story (The Idea Factory above): both institutional designs work, both are deliberate, both compound on the specific question they were built to answer."
order: 18
