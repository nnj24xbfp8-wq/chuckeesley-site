title: "Prediction Machines: The Simple Economics of Artificial Intelligence"
author: "Ajay Agrawal, Joshua Gans & Avi Goldfarb"
year: 2018
category: "foundational"
why: "The book that gave the economics profession a usable framing for what AI actually is, a sharp drop in the price of prediction. Pre-dates the LLM moment by several years but ages better than most of what came after. I use the framework when thinking about how AI changes founder cognition, venture diligence, and which parts of the entrepreneurial workflow get automated next."
order: 11
