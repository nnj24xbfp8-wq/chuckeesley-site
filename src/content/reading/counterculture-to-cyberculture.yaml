title: "From Counterculture to Cyberculture: Stewart Brand, the Whole Earth Network, and the Rise of Digital Utopianism"
author: "Fred Turner"
year: 2006
category: "return-to"
why: "Fred Turner's intellectual history of how Stewart Brand, the Whole Earth Catalog, the WELL, and the late-1960s counterculture became, by the 1990s, the cybernetic-libertarian ethos of Silicon Valley. The book I keep returning to — and citing in talks — when explaining why Silicon Valley reads the institutional environment around technology entrepreneurship the way it does, and what that reading misses. Pairs with Margaret O'Mara's The Code as the academic-grade history of how the Valley actually got built."
order: 6
