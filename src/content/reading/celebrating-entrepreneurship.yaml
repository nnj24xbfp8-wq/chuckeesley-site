title: "Celebrating Entrepreneurship: A Half-Century of MIT's Growth and Impact"
author: "Edward B. Roberts"
year: 2024
category: "institutional"
why: "Ed Roberts's career retrospective on the MIT Entrepreneurship Center he founded — what it took to build the academic infrastructure that produces founders, told by the person who did it for half a century. Ed was my doctoral advisor; almost every empirical method I use traces back to the alumni-survey approach he handed me as a PhD student. Reads as both institutional history and an underrated playbook for any university trying to build the same thing."
order: 12
