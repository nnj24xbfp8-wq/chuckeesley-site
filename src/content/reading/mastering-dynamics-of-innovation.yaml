title: "Mastering the Dynamics of Innovation"
author: "James M. Utterback"
year: 1994
category: "foundational"
why: "Jim Utterback's classic on dominant designs, technology life cycles, and how product and process innovation evolve through industry phases. Required reading at MIT Sloan when I was a doctoral student, and the book that established the empirical pattern most people now start with as their mental model for technology change. Part of the MIT Sloan intellectual lineage I inherited through Ed Roberts."
order: 13
