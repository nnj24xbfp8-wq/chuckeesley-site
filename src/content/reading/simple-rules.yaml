title: "Simple Rules: How to Thrive in a Complex World"
author: "Donald Sull & Kathleen M. Eisenhardt"
year: 2015
category: "foundational"
why: "My MS&E colleague Kathy Eisenhardt's most accessible synthesis of her foundational research on strategy in dynamic environments. The argument that a handful of simple rules outperforms elaborate strategy in fast-moving markets is one of the most useful frameworks I've encountered for thinking about founder decision-making."
order: 6
