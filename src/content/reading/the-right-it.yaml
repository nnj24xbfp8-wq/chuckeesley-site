title: "The Right It"
author: "Alberto Savoia"
year: 2019
category: "classroom"
why: "Savoia's framework for pretotyping, building cheap, fast fakes of a product to test whether people actually want it before committing to a real prototype. The most underrated discipline I teach. The methodology shows up across the customer-development literature but Savoia is where you find the cleanest version of it."
order: 5
