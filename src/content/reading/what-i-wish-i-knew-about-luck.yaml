title: "What I Wish I Knew About Luck: A Crash Course on Turning Aspirations into Achievements"
author: "Tina Seelig"
year: 2026
category: "recent"
why: "Tina's latest, structured around a sailing metaphor — your 'crew' is the network of relationships that produce most lucky breaks, your 'sail' is the deliberate action that catches the wind when it blows. Drawn from twenty-five years teaching entrepreneurship at Stanford and stories from the Knight–Hennessy scholars. The natural follow-on to What I Wish I Knew When I Was 20 (already on this list). Tina is my STVP colleague and holds the NAE Gordon Prize for engineering education — when she writes about how engineers learn to create their own opportunities, it lands."
order: 2
