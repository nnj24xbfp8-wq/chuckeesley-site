title: "The Business of Platforms: Strategy in the Age of Digital Competition, Innovation, and Power"
author: "Michael A. Cusumano, Annabelle Gawer & David B. Yoffie"
year: 2019
category: "foundational"
why: "Cusumano, Gawer, and Yoffie's empirical synthesis of what works and what fails in two-sided platform businesses, drawing on the platform-strategy research program Gawer and Cusumano started in the early 2000s. The most relevant single text to my own platform-governance work with Wesley Koo (the SMJ 2021 and Org Science 2025 papers). Cusumano is part of the MIT Sloan intellectual lineage that goes back through Ed Roberts."
order: 15
