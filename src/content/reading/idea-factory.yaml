title: "The Idea Factory: Bell Labs and the Great Age of American Innovation"
author: "Jon Gertner"
year: 2012
category: "institutional"
why: "Gertner's history of Bell Labs is the definitive account of the institutional layer Mervin Kelly built to convert basic research into the transistor, the laser, information theory, and Unix. The single best long-form case study of the intermediary-institutions argument I made in the 2026 WEF essay — when the institutional layer is real, federal research dollars produce industries; when it isn't, the same dollars produce papers."
order: 17
