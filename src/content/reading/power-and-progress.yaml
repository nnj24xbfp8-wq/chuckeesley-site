title: "Power and Progress: Our Thousand-Year Struggle Over Technology and Prosperity"
author: "Daron Acemoglu & Simon Johnson"
year: 2023
category: "institutional"
why: "Acemoglu and Johnson on who actually captures the gains from technological progress, and what determines whether new technology raises broad living standards or just concentrates power. A useful corrective to the techno-optimist default, and a piece of the puzzle for thinking about industrial policy, platform design, and the institutional choices around AI."
order: 10
