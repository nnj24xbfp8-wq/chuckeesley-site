title: "Democratizing Innovation"
author: "Eric von Hippel"
year: 2005
category: "foundational"
why: "Eric von Hippel's argument that innovation increasingly comes from users — lead users, communities of practice, open-source and open-hardware producers — not just from corporate R&D labs. The foundational book in the user-innovation research program, and freely available from MIT Press. Part of the MIT Sloan intellectual lineage; pairs with Utterback's dominant-design framework as a structural counterpoint to the supplier-side view of innovation."
order: 14
