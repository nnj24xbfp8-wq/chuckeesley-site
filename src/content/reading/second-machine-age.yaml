title: "The Second Machine Age"
author: "Erik Brynjolfsson & Andrew McAfee"
year: 2014
category: "foundational"
why: "The book that set up the framing I still use when thinking about how AI changes the economic landscape for founders and workers. Brynjolfsson is a co-author on the Nature paper on the algorithmic financing of misinformation; this is the longer arc of the argument he's been making since well before generative AI made it urgent."
order: 9
