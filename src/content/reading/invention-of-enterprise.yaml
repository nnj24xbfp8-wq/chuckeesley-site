title: "The Invention of Enterprise: Entrepreneurship from Ancient Mesopotamia to Modern Times"
author: "David S. Landes, Joel Mokyr & William J. Baumol (editors)"
year: 2010
category: "institutional"
why: "The book that maps entrepreneurship across civilizations — Mesopotamia, Neo-Babylon, the Islamic Middle East, China, Japan, Colonial India, and the medieval-to-modern West — with chapters by leading economic historians. The argument is that the institutional conditions for productive enterprise have varied enormously across time and place, and the question is always 'why here, why now,' never 'why entrepreneurship.' Useful long-arc context for almost any contemporary debate about innovation policy and the institutional layer."
order: 15
